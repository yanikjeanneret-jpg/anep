<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANEP — Bientôt en ligne</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Arial', sans-serif;
    background: #f5f5f3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 40px 20px;
    max-width: 600px;
  }
  .logo {
    font-size: 64px;
    font-weight: 900;
    color: #1a3c6e;
    letter-spacing: 8px;
    margin-bottom: 8px;
  }
  .tagline {
    font-size: 14px;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 60px;
  }
  .line {
    width: 60px;
    height: 3px;
    background: #1a3c6e;
    margin: 0 auto 40px;
  }
  h1 {
    font-size: 28px;
    color: #1a3c6e;
    margin-bottom: 20px;
    font-weight: 700;
  }
  p {
    font-size: 16px;
    color: #555;
    line-height: 1.8;
    margin-bottom: 40px;
  }
  .email {
    display: inline-block;
    padding: 14px 32px;
    background: #1a3c6e;
    color: white;
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 1px;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .email:hover { background: #0f2548; }
  .footer {
    margin-top: 60px;
    font-size: 12px;
    color: #aaa;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="logo">ANEP</div>
  <div class="tagline">Association pour la Neutralité de l'Enseignement Public</div>
  <div class="line"></div>
  <h1>Notre site arrive bientôt.</h1>
  <p>
    Nous travaillons à défendre la neutralité pédagogique dans l'enseignement public suisse.<br>
    Un site complet sera disponible très prochainement.
  </p>
  <a class="email" href="mailto:contact@anep.ch">contact@anep.ch</a>
  <div class="footer">Suisse · 2025</div>
</div>
</body>
</html>
